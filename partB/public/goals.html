<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Goals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon">⚡</div><span class="sidebar-logo-text">TaskFlow</span></div>
    <button class="btn-add-task" onclick="openTaskModal()">+ Add Task</button>
    <a class="nav-link" href="dashboard.html" data-page="tasks"><svg class="nav-svg" viewBox="0 0 16 16"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>All Tasks</a>
    <a class="nav-link" href="dashboard.html?filter=today"><svg class="nav-svg" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M5 1v4M11 1v4M2 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>Today</a>
    <a class="nav-link" href="dashboard.html?filter=upcoming"><svg class="nav-svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>Upcoming</a>
    <div class="sidebar-divider"></div>
    <div class="nav-section-label"><span>Projects</span><button onclick="location.href='projects.html'" class="nav-add-btn">+</button></div>
    <div id="sidebar-projects"></div>
    <div class="sidebar-divider"></div>
    <a class="nav-link" href="notes.html" data-page="notes"><svg class="nav-svg" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>Notes</a>
    <a class="nav-link" href="calendar.html" data-page="calendar"><svg class="nav-svg" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M5 1v4M11 1v4M2 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>Calendar</a>
    <a class="nav-link" href="habits.html" data-page="habits"><svg class="nav-svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M5.5 8l2 2 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>Habits</a>
    <a class="nav-link" href="goals.html" data-page="goals"><svg class="nav-svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>Goals</a>
    <a class="nav-link" href="time.html" data-page="time"><svg class="nav-svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>Time</a>
    <div class="nav-section-label"><span>Labels</span><button onclick="location.href='labels.html'" class="nav-add-btn">⚙</button></div>
    <div id="sidebar-labels"></div>
    <div class="sidebar-divider"></div>
    <a class="nav-link" href="notifications.html" data-page="notifications"><svg class="nav-svg" viewBox="0 0 16 16"><path d="M8 2a5 5 0 015 5v2l1 2H2l1-2V7a5 5 0 015-5zM6.5 13a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>Notifications <span id="notif-badge"></span></a>
    <div class="sidebar-bottom">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn"><span id="theme-icon">☀</span> <span id="theme-label">Light mode</span></button>
      <div class="user-chip" onclick="location.href='profile.html'">
        <div class="user-avatar" id="user-avatar-char">?</div>
        <span class="user-name" id="sidebar-user">User</span>
        <button class="btn-logout" onclick="event.stopPropagation();logout()"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M10 3l4 5-4 5M14 8H6M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>
  </aside>
  <main class="main">
    <section id="section-goals">
      <div class="section-header">
        <div><div class="section-title">Goals</div><div class="section-subtitle">Track your objectives</div></div>
        <button class="btn-new" onclick="openModal('goal-modal')">+ New Goal</button>
      </div>
      <div id="goal-list" class="card-grid"></div>
    </section>
  </main>
</div>
<div id="task-modal" class="modal" style="display:none"><div class="modal-box"><div class="modal-header"><span class="modal-title" id="task-modal-title">New Task</span><button class="modal-close" onclick="closeModal('task-modal')">✕</button></div><form onsubmit="saveTask(event)"><input type="hidden" id="task-id"><label>Title *</label><input type="text" id="task-title" required><label>Description</label><textarea id="task-desc" rows="2"></textarea><label>Status</label><select id="task-status"><option value="todo">Todo</option><option value="in-progress">In Progress</option><option value="in-review">In Review</option><option value="done">Done</option><option value="cancelled">Cancelled</option></select><label>Priority</label><select id="task-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="urgent">Urgent</option></select><label>Due Date</label><input type="datetime-local" id="task-due"><label>Project</label><select id="task-project"><option value="">No project</option></select><label>Assign to</label><select id="task-assignee"><option value="">Unassigned</option></select><label>Label</label><select id="task-label"><option value="">No label</option></select><div class="modal-actions"><button type="submit" class="btn-primary">Save Task</button><button type="button" class="btn-ghost" onclick="closeModal('task-modal')">Cancel</button></div></form></div></div>
<div id="project-modal" class="modal" style="display:none"><div class="modal-box"><div class="modal-header"><span class="modal-title">New Project</span><button class="modal-close" onclick="closeModal('project-modal')">✕</button></div><form onsubmit="saveProject(event)"><label>Name *</label><input type="text" id="proj-name" required><label>Description</label><textarea id="proj-desc" rows="2"></textarea><label>Color</label><input type="color" id="proj-color" value="#7c6af7"><div class="modal-actions"><button type="submit" class="btn-primary">Create</button><button type="button" class="btn-ghost" onclick="closeModal('project-modal')">Cancel</button></div></form></div></div>
<div id="goal-modal" class="modal" style="display:none"><div class="modal-box"><div class="modal-header"><span class="modal-title">New Goal</span><button class="modal-close" onclick="closeModal('goal-modal')">✕</button></div><form onsubmit="saveGoal(event)"><label>Title *</label><input type="text" id="goal-title" placeholder="What do you want to achieve?" required><label>Description</label><textarea id="goal-desc" rows="2"></textarea><label>Target Date</label><input type="date" id="goal-date"><label>Initial Progress (%)</label><input type="number" id="goal-progress" min="0" max="100" value="0"><div class="modal-actions"><button type="submit" class="btn-primary">Create</button><button type="button" class="btn-ghost" onclick="closeModal('goal-modal')">Cancel</button></div></form></div></div>

<div id="goal-detail-modal" class="modal" style="display:none">
  <div class="modal-box" style="width:560px;max-height:80vh;overflow-y:auto">
    <div class="modal-header">
      <span class="modal-title" id="gd-title"></span>
      <button class="modal-close" onclick="closeModal('goal-detail-modal')">✕</button>
    </div>
    <p id="gd-desc" style="color:var(--text-3);font-size:13px;margin-bottom:16px"></p>

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <label style="font-size:12px;font-weight:600;color:var(--text-2)">Status</label>
      <select id="gd-status" onchange="saveGoalStatus()" style="flex:1;min-width:100px">
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="abandoned">Abandoned</option>
      </select>
    </div>

    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3)">Progress</span>
        <span id="gd-progress-val" style="font-size:13px;font-weight:600;color:var(--accent)">0%</span>
      </div>
      <input type="range" id="gd-progress-range" min="0" max="100" style="width:100%" oninput="document.getElementById('gd-progress-val').textContent=this.value+'%'">
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-sm btn-accent" onclick="saveGoalProgress()">Set Progress</button>
        <button class="btn-sm" onclick="recalcGoalProgress()" title="Auto-calculate from linked tasks">↺ Recalc from tasks</button>
      </div>
    </div>

    <div style="margin-bottom:16px">
      <div class="dm-section-label">MILESTONES</div>
      <div id="gd-milestones" style="margin-bottom:8px"></div>
      <div style="display:flex;gap:6px">
        <input type="text" id="gd-ms-input" placeholder="Add milestone…" style="flex:1" onkeydown="if(event.key==='Enter')addGoalMilestone()">
        <button class="btn-sm btn-accent" onclick="addGoalMilestone()">+</button>
      </div>
    </div>

    <div>
      <div class="dm-section-label">LINKED TASKS</div>
      <div id="gd-tasks" style="margin-bottom:8px"></div>
      <div style="display:flex;gap:6px">
        <select id="gd-task-add" style="flex:1"><option value="">— Link a task —</option></select>
        <button class="btn-sm btn-accent" onclick="linkGoalTask()">Link</button>
      </div>
      <p style="font-size:11px;color:var(--text-3);margin-top:6px">When all linked tasks are done → click "Recalc from tasks" to auto-set 100%</p>
    </div>
    <div class="modal-actions modal-actions-right">
      <button type="button" class="btn-ghost btn-del" onclick="deleteCurrentGoal()">Delete</button>
      <button type="button" class="btn-ghost" onclick="closeModal('goal-detail-modal')">Close</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
