<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-wrap">
      <div class="auth-logo">
        <div class="auth-logo-icon">⚡</div>
        <span class="auth-logo-text">TaskFlow</span>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Sign In</button>
        <button class="tab" onclick="showTab('register')">Sign Up</button>
      </div>

      <form id="login-form" onsubmit="login(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Sign In →</button>
        <p id="login-error" class="error-msg"></p>
      </form>

      <form id="register-form" style="display:none" onsubmit="register(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="yourname" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 8 characters" required minlength="8">
        </div>
        <button type="submit" class="btn-primary">Create Account →</button>
        <p id="register-error" class="error-msg"></p>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
